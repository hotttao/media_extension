<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>Media Task Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #f4f1ec;
        --surface: #ffffff;
        --surface-raised: #faf8f5;
        --border: rgba(90, 65, 30, 0.13);
        --border-active: rgba(90, 65, 30, 0.38);
        --text-primary: #1c1410;
        --text-muted: #7a6858;
        --text-dim: #b0a090;
        --accent: #c0551a;
        --accent-light: #f7ece4;
        --warning: #c07020;
        --warning-light: #fdf3e3;
        --danger: #c02020;
        --danger-light: #fdeaea;
        --success: #2a7a3a;
        --success-light: #e8f3eb;
        --shadow-sm: 0 1px 4px rgba(60,40,10,0.07);
        --shadow: 0 4px 16px rgba(60,40,10,0.10);
        --radius-lg: 18px;
        --radius-md: 12px;
        --radius-sm: 8px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 14px; }

      body {
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        background-image:
          radial-gradient(circle at 8% 20%, rgba(192, 85, 26, 0.04) 0%, transparent 40%),
          radial-gradient(circle at 92% 80%, rgba(90, 65, 30, 0.04) 0%, transparent 40%);
      }

      /* ── SHELL ─────────────────────────────── */
      .shell {
        max-width: 1300px;
        margin: 0 auto;
        padding: 28px 24px;
        display: grid;
        gap: 18px;
      }

      /* ── HERO ROW ─────────────────────────── */
      .hero-row {
        display: grid;
        grid-template-columns: 1.4fr 0.8fr;
        gap: 18px;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow);
        position: relative;
      }

      .panel::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), #d4701a);
        pointer-events: none;
      }

      .hero-card { padding: 24px 24px 20px; }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--accent-light);
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin-bottom: 12px;
      }

      .eyebrow-dot {
        width: 5px; height: 5px;
        border-radius: 50%;
        background: var(--accent);
        animation: blink 2.4s ease-in-out infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }

      .hero-title {
        font-size: 24px;
        font-weight: 700;
        line-height: 1.25;
        letter-spacing: -0.02em;
        color: var(--text-primary);
        margin-bottom: 8px;
      }

      .hero-title em {
        font-style: normal;
        color: var(--accent);
      }

      .hero-copy {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.7;
        margin-bottom: 20px;
      }

      .hero-actions { display: flex; gap: 8px; flex-wrap: wrap; }

      /* ── BUTTONS ───────────────────────────── */
      button {
        border: 0;
        border-radius: 999px;
        padding: 8px 16px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: all 140ms ease;
        letter-spacing: 0.02em;
      }

      button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
      button:active:not(:disabled) { transform: scale(0.97); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }

      .btn-primary {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 3px 10px rgba(192, 85, 26, 0.28);
      }
      .btn-primary:hover:not(:disabled) { background: #a84815; }

      .btn-secondary {
        background: var(--warning-light);
        color: var(--warning);
        border: 1px solid rgba(192, 112, 32, 0.22);
      }
      .btn-secondary:hover:not(:disabled) { background: #faecd8; }

      .btn-danger {
        background: var(--danger-light);
        color: var(--danger);
        border: 1px solid rgba(192, 32, 32, 0.2);
      }
      .btn-danger:hover:not(:disabled) { background: #fce0e0; }

      .btn-ghost {
        background: var(--surface);
        color: var(--text-muted);
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
      }
      .btn-ghost:hover:not(:disabled) { color: var(--text-primary); border-color: var(--border-active); }

      /* ── SUMMARY CARD ──────────────────────── */
      .summary-card { padding: 18px; }

      .summary-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .panel-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
      .summary-ts   { font-size: 11px; color: var(--text-dim); }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        margin-bottom: 12px;
      }

      .summary-stat {
        border-radius: var(--radius-md);
        background: var(--surface-raised);
        border: 1px solid var(--border);
        padding: 12px;
      }

      .summary-stat-label {
        font-size: 11px;
        color: var(--text-dim);
        margin-bottom: 5px;
      }

      .summary-stat-value {
        font-size: 26px;
        font-weight: 700;
        line-height: 1;
        color: var(--accent);
      }

      .summary-stat-value.warn  { color: var(--warning); }
      .summary-stat-value.danger { color: var(--danger); }

      .summary-foot { font-size: 11px; color: var(--text-dim); line-height: 1.5; }

      /* ── CONTENT GRID ──────────────────────── */
      .content-grid {
        display: grid;
        grid-template-columns: 1.2fr 0.7fr;
        gap: 18px;
      }

      /* ── PANEL HEADER ──────────────────────── */
      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        padding: 13px 18px;
        border-bottom: 1px solid var(--border);
        background: var(--surface-raised);
      }

      .panel-meta { display: grid; gap: 2px; }
      .panel-subtitle { font-size: 11px; color: var(--text-muted); }

      .panel-badge {
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.05em;
      }

      .badge-running {
        background: var(--warning-light);
        color: var(--warning);
        border: 1px solid rgba(192,112,32,0.22);
        animation: blink 1.8s ease-in-out infinite;
      }

      .badge-idle {
        background: var(--accent-light);
        color: var(--accent);
        border: 1px solid rgba(192,85,26,0.18);
      }

      .panel-body { padding: 14px 18px; }

      /* ── PLATFORM CARDS ────────────────────── */
      .platform-list { display: grid; gap: 10px; }

      .platform-card {
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        background: var(--surface-raised);
        overflow: hidden;
        transition: border-color 180ms, box-shadow 180ms;
      }

      .platform-card.active {
        border-color: rgba(192, 85, 26, 0.3);
        box-shadow: 0 0 0 2px rgba(192,85,26,0.06), var(--shadow-sm);
      }

      .platform-card.has-error { border-color: rgba(192, 32, 32, 0.28); }

      .platform-top {
        padding: 10px 14px 9px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(90,65,30,0.06);
      }

      .platform-abbr { font-size: 10px; color: var(--text-dim); margin-bottom: 1px; }
      .platform-name { font-size: 14px; font-weight: 700; }

      .platform-body { padding: 10px 14px; }

      .stat-strip {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        margin-bottom: 8px;
      }

      .mini-stat {
        border-radius: var(--radius-sm);
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 7px 4px;
        text-align: center;
      }

      .mini-label { font-size: 10px; color: var(--text-dim); margin-bottom: 3px; }
      .mini-value { font-size: 17px; font-weight: 700; color: var(--text-muted); }
      .mini-value.live { color: var(--success); }
      .mini-value.warn { color: var(--warning); }
      .mini-value.err  { color: var(--danger); }

      .platform-log {
        height: 24px;
        overflow: hidden;
        margin-bottom: 7px;
        position: relative;
      }

      .platform-log::after {
        content: "";
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 10px;
        background: linear-gradient(transparent, var(--surface-raised));
        pointer-events: none;
      }

      .log-line {
        font-size: 11px;
        color: var(--text-dim);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.5;
      }

      .log-line:last-child { color: var(--text-muted); }

      .platform-actions { display: flex; gap: 6px; }

      .btn-platform {
        flex: 1;
        padding: 6px 8px;
        border-radius: var(--radius-sm);
        font-size: 11px;
        font-weight: 700;
        border: 1px solid;
        cursor: pointer;
        transition: all 120ms ease;
        background: transparent;
        font-family: inherit;
      }

      .btn-platform:disabled { opacity: 0.3; cursor: not-allowed; }

      .btn-platform.start  { border-color: rgba(42,122,58,0.32); color: var(--success); background: var(--success-light); }
      .btn-platform.start:hover:not(:disabled) { background: #d5eedd; border-color: var(--success); }

      .btn-platform.stop   { border-color: rgba(192,112,32,0.32); color: var(--warning); background: var(--warning-light); }
      .btn-platform.stop:hover:not(:disabled)  { background: #faecd8; border-color: var(--warning); }

      .btn-platform.cancel { border-color: rgba(192,32,32,0.28); color: var(--danger); background: var(--danger-light); }
      .btn-platform.cancel:hover:not(:disabled){ background: #fce0e0; border-color: var(--danger); }

      /* ── CONFIG PANEL ──────────────────────── */
      .config-body { padding: 14px 18px; }

      .settings-stack { display: grid; gap: 12px; }

      .field { display: grid; gap: 5px; }

      .field label { font-size: 11px; color: var(--text-muted); font-weight: 500; }

      .field input,
      .field select {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: var(--radius-sm);
        padding: 8px 11px;
        font-family: inherit;
        font-size: 13px;
        color: var(--text-primary);
        outline: none;
        transition: border-color 140ms, box-shadow 140ms;
      }

      .field input:focus,
      .field select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(192,85,26,0.1);
      }

      .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

      .toggle-row {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 10px 12px;
        border-radius: var(--radius-md);
        background: var(--surface-raised);
        border: 1px solid var(--border);
        cursor: pointer;
        transition: border-color 140ms;
      }

      .toggle-row:hover { border-color: var(--border-active); }

      .toggle-track {
        width: 32px; height: 18px;
        border-radius: 9px;
        background: var(--border);
        position: relative;
        flex-shrink: 0;
        margin-top: 1px;
        transition: background 200ms;
      }

      .toggle-track.on { background: var(--accent); }

      .toggle-thumb {
        position: absolute;
        top: 2px; left: 2px;
        width: 12px; height: 12px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 2px rgba(0,0,0,0.15);
        transition: left 180ms ease;
      }

      .toggle-track.on .toggle-thumb { left: 16px; }

      .toggle-copy { display: grid; gap: 2px; }
      .toggle-title { font-size: 12px; font-weight: 700; color: var(--text-primary); }
      .toggle-help  { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

      /* ── ACTIVITY LOG ──────────────────────── */
      .activity-list {
        display: grid;
        gap: 7px;
        max-height: 280px;
        overflow-y: auto;
      }

      .activity-list::-webkit-scrollbar { width: 3px; }
      .activity-list::-webkit-scrollbar-track { background: transparent; }
      .activity-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .activity-item {
        padding: 9px 12px;
        border-radius: var(--radius-sm);
        background: var(--surface-raised);
        border: 1px solid var(--border);
      }

      .activity-meta { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
      .activity-message { font-size: 12px; color: var(--text-muted); }
      .activity-message.success { color: var(--success); }
      .activity-message.warning { color: var(--warning); }
      .activity-message.error   { color: var(--danger); }

      /* ── RESPONSIVE ─────────────────────────── */
      @media (max-width: 1100px) {
        .hero-row, .content-grid { grid-template-columns: 1fr; }
      }

      @media (max-width: 700px) {
        .shell { padding: 14px; }
        .summary-grid, .stat-strip, .settings-grid { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="shell">

      <!-- HERO ROW -->
      <section class="hero-row">
        <div class="panel hero-card">
          <div class="eyebrow">
            <div class="eyebrow-dot"></div>
            媒体任务控制台
          </div>
          <h1 class="hero-title">一个面板，<br>掌控<em>所有生成器</em></h1>
          <p class="hero-copy">
            从一处启动所有 worker，实时观察队列压力，只在真正需要时才打开深层控制。
          </p>
          <div class="hero-actions">
            <button id="start-all-btn"  class="btn-primary">▶ 全部启动</button>
            <button id="stop-all-btn"   class="btn-secondary">■ 全部停止</button>
            <button id="cancel-all-btn" class="btn-danger">✕ 取消全部</button>
            <button id="refresh-btn"    class="btn-ghost">↻ 刷新</button>
          </div>
        </div>

        <div class="panel summary-card">
          <div class="summary-head">
            <div class="panel-title">系统快照</div>
            <div class="summary-ts" id="last-updated">—</div>
          </div>
          <div class="summary-grid" id="summary-grid"></div>
          <div class="summary-foot" id="summary-foot"></div>
        </div>
      </section>

      <!-- CONTENT GRID -->
      <section class="content-grid">

        <!-- PLATFORM STATUS -->
        <section class="panel">
          <div class="panel-header">
            <div class="panel-meta">
              <div class="panel-title">平台状态</div>
              <div class="panel-subtitle">高频控制区，配置项在右侧。</div>
            </div>
            <div class="panel-badge badge-running" id="global-badge" style="display:none">运行中</div>
          </div>
          <div class="panel-body">
            <div class="platform-list" id="platform-grid"></div>
          </div>
        </section>

        <!-- CONFIGURATION -->
        <section class="panel">
          <div class="panel-header">
            <div class="panel-meta">
              <div class="panel-title">配置</div>
              <div class="panel-subtitle">各平台轮询间隔与全局开关。</div>
            </div>
          </div>
          <div class="config-body">
            <div class="settings-stack">
              <div class="field">
                <label for="server-url">Bridge 地址</label>
                <input id="server-url" type="text" value="http://127.0.0.1:8765" spellcheck="false">
              </div>

              <div class="field">
                <label for="platform-select">平台</label>
                <select id="platform-select">
                  <option value="">— 全部平台 —</option>
                </select>
              </div>

              <div class="settings-grid">
                <div class="field">
                  <label for="platform-interval">轮询间隔（秒）</label>
                  <input id="platform-interval" type="number" min="1" value="5">
                </div>
                <div class="field">
                  <label for="platform-concurrency">并发数</label>
                  <input id="platform-concurrency" type="number" min="1" value="1">
                </div>
              </div>

              <div class="toggle-row" id="confirm-toggle">
                <div class="toggle-track" id="confirm-track"><div class="toggle-thumb"></div></div>
                <div class="toggle-copy">
                  <div class="toggle-title">即梦视频生成前确认</div>
                  <div class="toggle-help">付费任务提交前暂停，允许核查提示词、模型、帧和比例。</div>
                </div>
              </div>

              <div class="hero-actions" style="margin-top:0">
                <button id="save-global-btn" class="btn-primary">保存配置</button>
              </div>
            </div>
          </div>
          <div class="subtle-note" style="font-size:11px;color:var(--text-dim);padding:0 18px 14px;line-height:1.5">
            平台卡片聚焦执行状态，配置项收拢在右侧，保证面板在平台增加后依然整洁。
          </div>
        </section>
      </section>

      <!-- RECENT ACTIVITY -->
      <section class="panel">
        <div class="panel-header">
          <div class="panel-meta">
            <div class="panel-title">最近活动</div>
            <div class="panel-subtitle">操作事件和控制动作的实时记录。</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="activity-list" id="log-list"></div>
        </div>
      </section>

    </div>
    <script src="dashboard.js"></script>
  </body>
</html>
