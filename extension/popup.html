<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Media Image Runner</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 380px;
        padding: 12px;
        font-family: "Segoe UI", sans-serif;
        background: #f5f1e8;
        color: #1f1d1a;
        font-size: 13px;
      }
      .platform-section {
        border: 1px solid #e6dac7;
        border-radius: 10px;
        background: white;
        margin-bottom: 10px;
        overflow: hidden;
      }
      .platform-header {
        padding: 10px 14px;
        background: #faf6ee;
        border-bottom: 1px solid #e6dac7;
        font-weight: 600;
        font-size: 14px;
      }
      .platform-body { padding: 10px 14px; }
      .actions { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
      button {
        padding: 6px 14px;
        border: 0;
        border-radius: 999px;
        background: #1f1d1a;
        color: white;
        cursor: pointer;
        font-size: 12px;
      }
      button.secondary { background: #8e6d3f; }
      button.danger { background: #9a1c1c; }
      button.test-btn { background: #2563eb; font-size: 11px; padding: 4px 10px; }
      button.test-btn:hover { background: #1d4ed8; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .stats {
        display: flex;
        gap: 12px;
        margin-bottom: 6px;
        font-size: 11px;
        color: #666;
      }
      .stat-item { display: flex; gap: 4px; }
      .stat-label { color: #999; }
      .status-line {
        font-size: 11px;
        color: #555;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .error-line { color: #9a1c1c; font-size: 11px; margin-top: 2px; }
      .test-panel {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px dashed #e6dac7;
      }
      .test-panel-label {
        font-size: 11px;
        color: #666;
        margin-bottom: 6px;
        font-weight: 600;
      }
      .test-steps { display: flex; gap: 4px; flex-wrap: wrap; }
      .test-result {
        margin-top: 6px;
        padding: 6px 8px;
        background: #f0f9ff;
        border-radius: 6px;
        font-size: 11px;
        color: #1e40af;
        max-height: 60px;
        overflow-y: auto;
      }
      .test-result.error {
        background: #fef2f2;
        color: #991b1b;
      }
      .manual-panel {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px dashed #e6dac7;
      }
      .manual-panel-label {
        font-size: 11px;
        color: #666;
        margin-bottom: 6px;
        font-weight: 600;
      }
      .manual-input {
        width: 100%;
        height: 80px;
        font-family: monospace;
        font-size: 10px;
        padding: 6px;
        border: 1px solid #e6dac7;
        border-radius: 6px;
        resize: vertical;
        margin-bottom: 6px;
        background: #faf6ee;
        color: #1f1d1a;
      }
      .manual-input::placeholder { color: #bbb; }
      .manual-input.error { border-color: #9a1c1c; }
      .manual-run-btn {
        width: 100%;
        padding: 6px;
        background: #2563eb;
        color: white;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
      }
      .manual-run-btn:hover { background: #1d4ed8; }
      .manual-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .manual-result {
        margin-top: 6px;
        padding: 6px 8px;
        background: #f0fdf4;
        border-radius: 6px;
        font-size: 11px;
        color: #166534;
        max-height: 60px;
        overflow-y: auto;
      }
      .manual-result.error {
        background: #fef2f2;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <div id="platforms"></div>
    <script src="popup.js"></script>
  </body>
</html>
