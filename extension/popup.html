<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Media Image Runner</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 360px;
        padding: 12px;
        font-family: "Segoe UI", sans-serif;
        background: #f5f1e8;
        color: #1f1d1a;
        font-size: 13px;
      }
      .platform-section {
        border: 1px solid #e6dac7;
        border-radius: 10px;
        background: white;
        margin-bottom: 10px;
        overflow: hidden;
      }
      .platform-header {
        padding: 10px 14px;
        background: #faf6ee;
        border-bottom: 1px solid #e6dac7;
        font-weight: 600;
        font-size: 14px;
      }
      .platform-body { padding: 10px 14px; }
      .actions { display: flex; gap: 6px; margin-bottom: 8px; }
      button {
        padding: 6px 14px;
        border: 0;
        border-radius: 999px;
        background: #1f1d1a;
        color: white;
        cursor: pointer;
        font-size: 12px;
      }
      button.secondary { background: #8e6d3f; }
      button.danger { background: #9a1c1c; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .stats {
        display: flex;
        gap: 12px;
        margin-bottom: 6px;
        font-size: 11px;
        color: #666;
      }
      .stat-item { display: flex; gap: 4px; }
      .stat-label { color: #999; }
      .status-line {
        font-size: 11px;
        color: #555;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .error-line { color: #9a1c1c; font-size: 11px; margin-top: 2px; }
    </style>
  </head>
  <body>
    <div id="platforms"></div>
    <script src="popup.js"></script>
  </body>
</html>
