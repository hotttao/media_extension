<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>ChatGPT Image Runner</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: "Segoe UI", sans-serif;
        background: #f5f1e8;
        color: #1f1d1a;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: 600;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #b8aa91;
        border-radius: 8px;
        background: #fffdf8;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        flex: 1;
        padding: 10px 12px;
        border: 0;
        border-radius: 999px;
        background: #1f1d1a;
        color: white;
        cursor: pointer;
      }

      button.secondary {
        background: #8e6d3f;
      }

      .card {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        background: white;
        border: 1px solid #e6dac7;
      }

      .line {
        margin: 6px 0;
        font-size: 12px;
        line-height: 1.5;
        word-break: break-word;
      }

      .error {
        color: #9a1c1c;
      }
    </style>
  </head>
  <body>
    <h1>ChatGPT Image Runner</h1>
    <label for="serverUrl">Local server</label>
    <input id="serverUrl" type="text" value="http://127.0.0.1:8765">
    <div class="actions">
      <button id="startButton">Start</button>
      <button id="stopButton" class="secondary">Stop</button>
    </div>
    <div class="card">
      <div class="line" id="statusLine">Status: Idle</div>
      <div class="line" id="jobLine">Job: -</div>
      <div class="line error" id="errorLine"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
