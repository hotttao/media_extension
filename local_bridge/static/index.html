<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务管理器</title>
<style>
  :root {
    --bg: #F5F4F0;
    --surface: #FFFFFF;
    --surface2: #FAFAF8;
    --border: #E0DDD5;
    --text: #2A2825;
    --text-muted: #8A8580;
    --accent: #D4591A;
    --accent-light: #FFF0E8;
    --green: #2A9D6E;
    --green-light: #E8F7F1;
    --red: #D44A4A;
    --red-light: #FDEEEE;
    --orange: #E07A2A;
    --orange-light: #FEF3E8;
    --blue: #3A7BD5;
    --blue-light: #EAF1FB;
    --pending-bg: #F0EFEB;
    --pending-text: #7A7570;
    --running-bg: #EAF1FB;
    --running-text: #3A7BD5;
    --completed-bg: #E8F7F1;
    --completed-text: #2A9D6E;
    --failed-bg: #FDEEEE;
    --failed-text: #D44A4A;
    --canceled-bg: #F0EFEB;
    --canceled-text: #7A7570;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .app {
    max-width: 100%;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* 头部 */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--border);
  }

  .logo {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .logo span {
    color: var(--accent);
    margin-left: 6px;
  }

  .header-stats {
    display: flex;
    gap: 20px;
    margin-left: auto;
  }

  .stat {
    text-align: center;
    min-width: 56px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .stat.pending .stat-value { color: var(--pending-text); }
  .stat.running .stat-value { color: var(--running-text); }
  .stat.completed .stat-value { color: var(--completed-text); }
  .stat.failed .stat-value { color: var(--failed-text); }

  /* 工具栏 */
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
  }

  .filter-group {
    display: flex;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }

  .filter-btn {
    padding: 5px 13px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { color: var(--text); background: var(--surface2); }
  .filter-btn.active { background: var(--accent); color: #fff; }

  button {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }

  button:hover { background: var(--surface2); border-color: var(--text-muted); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: default; }

  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: #B84E15; border-color: #B84E15; }

  button.danger { border-color: var(--red); color: var(--red); }
  button.danger:hover { background: var(--red-light); }

  button.success { border-color: var(--green); color: var(--green); }
  button.success:hover { background: var(--green-light); }

  button.warning { border-color: var(--orange); color: var(--orange); }
  button.warning:hover { background: var(--orange-light); }

  .toolbar-right {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-left: auto;
  }

  .status-bar {
    font-size: 12px;
    color: var(--text-muted);
  }

  .status-bar.error { color: var(--red); }
  .status-bar.success { color: var(--green); }

  /* 错误提示 */
  .error-banner {
    background: var(--red-light);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--red);
    display: none;
  }

  .error-banner.visible { display: block; }

  /* 表格容器 - 带横向滚动 */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: auto;
    max-width: 100%;
  }

  table {
    width: max-content;
    min-width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    border-bottom: 2px solid var(--border);
  }

  th {
    text-align: left;
    padding: 12px 16px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    background: var(--surface2);
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    white-space: nowrap;
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #FDFCF9; }
  tbody tr.row-running td { background: var(--blue-light); }

  /* 任务ID */
  .job-id {
    font-size: 12px;
    color: var(--accent);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: block;
    cursor: pointer;
    font-family: 'SF Mono', 'Menlo', monospace;
  }

  .job-id:hover { text-decoration: underline; }

  /* 状态标签 */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .status-badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .status-badge.running .dot { animation: pulse 1.5s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-badge.pending { background: var(--pending-bg); color: var(--pending-text); }
  .status-badge.running { background: var(--running-bg); color: var(--running-text); }
  .status-badge.completed { background: var(--completed-bg); color: var(--completed-text); }
  .status-badge.failed { background: var(--failed-bg); color: var(--failed-text); }
  .status-badge.canceled { background: var(--canceled-bg); color: var(--canceled-text); }

  /* 案件文件 */
  .case-file {
    color: var(--text-muted);
    font-size: 12px;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* 时间 */
  .time-cell { color: var(--text-muted); font-size: 12px; white-space: nowrap; }

  /* 进度 */
  .progress-msg {
    font-size: 12px;
    color: var(--text-muted);
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* 失败原因 */
  .failure-reason {
    font-size: 12px;
    color: var(--red);
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* 操作按钮 */
  .action-btn {
    padding: 5px 12px;
    font-size: 11px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.12s;
    font-family: inherit;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .action-btn:hover:not(:disabled) {
    background: var(--surface2);
    border-color: var(--text-muted);
  }

  .action-btn:disabled { opacity: 0.3; cursor: default; }

  .action-btn.requeue { border-color: var(--green); color: var(--green); }
  .action-btn.requeue:hover:not(:disabled) { background: var(--green-light); }

  .action-btn.cancel { border-color: var(--orange); color: var(--orange); }
  .action-btn.cancel:hover:not(:disabled) { background: var(--orange-light); }

  .action-btn.delete { border-color: var(--red); color: var(--red); }
  .action-btn.delete:hover:not(:disabled) { background: var(--red-light); }

  /* 空状态 */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  /* 弹窗 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 400px;
    max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  .modal-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }

  .modal-body {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
    line-height: 1.7;
  }

  .modal-body code {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent);
    font-size: 12px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* 详情弹窗 */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }

  .detail-overlay.active { display: flex; }

  .detail-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 600px;
    max-width: 95vw;
    max-height: 85vh;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
  }

  .detail-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
  }

  .detail-header .job-id-title {
    font-size: 13px;
    color: var(--accent);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: 'SF Mono', 'Menlo', monospace;
  }

  .detail-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.12s;
  }

  .detail-close:hover { color: var(--text); background: var(--border); }

  .detail-body {
    padding: 22px;
    overflow-y: auto;
    flex: 1;
  }

  .detail-section { margin-bottom: 22px; }
  .detail-section:last-child { margin-bottom: 0; }

  .detail-section-title {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.05em;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 20px;
  }

  .detail-field { display: flex; flex-direction: column; gap: 3px; }
  .detail-field.full { grid-column: 1 / -1; }

  .detail-field-label {
    font-size: 11px;
    color: var(--text-muted);
  }

  .detail-field-value {
    font-size: 13px;
    color: var(--text);
    word-break: break-all;
  }

  .detail-field-value.mono {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  .detail-field-value.null { color: var(--text-muted); font-style: italic; }

  .detail-progress-list { display: flex; flex-direction: column; gap: 8px; }

  .detail-progress-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .detail-progress-item .ts { font-size: 11px; color: var(--text-muted); white-space: nowrap; min-width: 65px; }
  .detail-progress-item .msg { font-size: 12px; color: var(--text); flex: 1; }
  .detail-progress-item .details { font-size: 11px; color: var(--text-muted); margin-top: 4px; word-break: break-all; }

  .detail-assets { display: flex; flex-direction: column; gap: 6px; }

  .detail-asset-item {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 6px;
    font-size: 12px;
  }

  .detail-asset-item .idx { color: var(--text-muted); min-width: 22px; }
  .detail-asset-item .label { color: var(--text); }
  .detail-asset-item .name { color: var(--text-muted); font-family: 'SF Mono', 'Menlo', monospace; margin-left: auto; }
  .detail-asset-item .mime { color: var(--text-muted); font-size: 11px; }

  /* 提示 */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 2000;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .toast.visible { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }
  .toast.info { border-color: var(--blue); }

  /* 可点击行 */
  .row-clickable { cursor: pointer; }

  /* 滚动条样式 */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); border-radius: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>
<div class="app">
  <!-- 头部 -->
  <div class="header">
    <div class="logo">任务管理器<span>local_bridge</span></div>
    <div class="header-stats">
      <div class="stat pending"><div class="stat-value" id="stat-pending">—</div><div class="stat-label">待处理</div></div>
      <div class="stat running"><div class="stat-value" id="stat-running">—</div><div class="stat-label">执行中</div></div>
      <div class="stat completed"><div class="stat-value" id="stat-completed">—</div><div class="stat-label">已完成</div></div>
      <div class="stat failed"><div class="stat-value" id="stat-failed">—</div><div class="stat-label">失败</div></div>
    </div>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <button onclick="fetchJobs()" class="primary">刷新</button>
    <div class="filter-group">
      <button class="filter-btn active" data-filter="">全部</button>
      <button class="filter-btn" data-filter="pending">待处理</button>
      <button class="filter-btn" data-filter="running">执行中</button>
      <button class="filter-btn" data-filter="completed">已完成</button>
      <button class="filter-btn" data-filter="failed">失败</button>
      <button class="filter-btn" data-filter="canceled">已取消</button>
    </div>
    <div class="toolbar-right">
      <button onclick="confirmCancelAll()" style="color: var(--orange); border-color: var(--orange);">取消全部待处理</button>
      <span class="status-bar" id="status-bar"></span>
    </div>
  </div>

  <!-- 错误提示 -->
  <div class="error-banner" id="error-banner"></div>

  <!-- 表格 -->
  <div class="table-wrap">
    <div id="jobs-table"></div>
  </div>
</div>

<!-- 确认弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">确认</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <button onclick="closeModal()">取消</button>
      <button id="modal-confirm-btn" class="danger" onclick="confirmModal()">确认</button>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="detail-overlay" id="detail-modal">
  <div class="detail-modal">
    <div class="detail-header">
      <span class="job-id-title" id="detail-job-id"></span>
      <span id="detail-status-badge"></span>
      <button class="detail-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<!-- 提示 -->
<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;
let pendingAction = null;
let currentJobs = [];

function el(s) { return document.querySelector(s); }
function els(s) { return document.querySelectorAll(s); }

/* ── 提示 ── */
function showToast(msg, type = 'info') {
  const t = el('#toast');
  t.textContent = msg;
  t.className = `toast ${type} visible`;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

/* ── 错误 ── */
function showError(msg) {
  const e = el('#error-banner');
  e.textContent = msg;
  e.classList.add('visible');
}
function clearError() { el('#error-banner').classList.remove('visible'); }

/* ── 状态栏 ── */
function setStatus(msg, type = '') {
  const sb = el('#status-bar');
  sb.textContent = msg;
  sb.className = `status-bar ${type}`;
}

/* ── 弹窗 ── */
function showModal(title, body, onConfirm, confirmLabel = '确认', confirmClass = 'danger') {
  el('#modal-title').textContent = title;
  el('#modal-body').innerHTML = body;
  const btn = el('#modal-confirm-btn');
  btn.textContent = confirmLabel;
  btn.className = confirmClass;
  btn.onclick = onConfirm;
  el('#modal').classList.add('active');
}
function closeModal() {
  el('#modal').classList.remove('active');
  pendingAction = null;
}
function confirmModal() {
  if (pendingAction) pendingAction();
  closeModal();
}

/* ── 状态标签 ── */
function statusBadge(status) {
  const map = {
    pending: '待处理',
    running: '执行中',
    completed: '已完成',
    failed: '失败',
    canceled: '已取消'
  };
  return `<span class="status-badge ${status}"><span class="dot"></span>${map[status] || status}</span>`;
}

/* ── 时间 ── */
function timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
  return Math.floor(diff / 86400000) + '天前';
}

/* ── 操作按钮 ── */
function actionBtn(label, onclick, cls, disabled) {
  return `<button class="action-btn ${cls}" onclick="event.stopPropagation();${onclick}" ${disabled ? 'disabled' : ''}>${label}</button>`;
}

/* ── 转义 ── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── API ── */
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(API + path, opts);
  if (!r.ok) {
    let msg = `${r.status} ${r.statusText}`;
    try { const j = await r.json(); msg = j.detail || j.error || msg; } catch {}
    throw new Error(msg);
  }
  return r.json();
}

/* ── 获取并渲染 ── */
async function fetchJobs() {
  clearError();
  setStatus('加载中...');
  try {
    const data = await api('GET', '/v1/state');
    currentJobs = data.jobs || [];
    renderAll(currentJobs);
    setStatus('');
  } catch (e) {
    showError('获取任务列表失败: ' + e.message);
    setStatus('加载失败', 'error');
  }
}

function renderAll(jobs) {
  renderStats(jobs);
  renderTable(jobs);
}

function renderStats(jobs) {
  const counts = { pending: 0, running: 0, completed: 0, failed: 0, canceled: 0 };
  jobs.forEach(j => { if (counts[j.status] !== undefined) counts[j.status]++; });
  el('#stat-pending').textContent = counts.pending;
  el('#stat-running').textContent = counts.running;
  el('#stat-completed').textContent = counts.completed;
  el('#stat-failed').textContent = counts.failed;
}

function renderTable(jobs) {
  if (jobs.length === 0) {
    el('#jobs-table').innerHTML = `<div class="empty"><div class="empty-icon">◯</div><div>暂无任务</div></div>`;
    return;
  }

  const filter = el('.filter-btn.active').dataset.filter;
  const filtered = filter ? jobs.filter(j => j.status === filter) : jobs;

  const rows = filtered.map(job => {
    const latest = job.latestProgress || {};
    const canRequeue = ['failed', 'canceled', 'completed', 'running'].includes(job.status);
    const canCancel = job.status === 'pending';
    const canDelete = !canCancel && job.status !== 'running';
    const isRunning = job.status === 'running';
    const caseFileName = job.caseFile ? job.caseFile.split(/[/\\]/).slice(-2).join('/') : '—';

    const actions = [
      canRequeue ? actionBtn('重新排队', `requeueJob('${esc(job.id)}')`, 'requeue') : '',
      canCancel ? actionBtn('取消', `confirmCancel('${esc(job.id)}')`, 'cancel') : '',
      canDelete ? actionBtn('删除', `confirmDelete('${esc(job.id)}')`, 'delete') : '',
    ].join('');

    return `<tr class="row-clickable ${isRunning ? 'row-running' : ''}" onclick="detailOnClick('${esc(job.id)}')">
      <td><span class="job-id" title="${esc(job.id)}">${esc(job.id)}</span></td>
      <td>${statusBadge(job.status)}</td>
      <td><span class="case-file" title="${esc(job.caseFile)}">${esc(caseFileName)}</span></td>
      <td><span class="time-cell">${job.createdAt ? timeAgo(job.createdAt) : '—'}</span></td>
      <td><span class="time-cell">${job.claimedAt ? timeAgo(job.claimedAt) : '—'}</span></td>
      <td>${latest.message
        ? `<div class="progress-msg" title="${esc(latest.message)}${latest.details ? ' ' + JSON.stringify(latest.details).slice(0,60) : ''}">${esc(latest.message)}</div>`
        : '<span style="color:var(--text-muted)">—</span>'}
      </td>
      <td>${job.failureReason
        ? `<span class="failure-reason" title="${esc(job.failureReason)}">${esc(job.failureReason)}</span>`
        : '—'}
      </td>
      <td onclick="event.stopPropagation()"><div style="display:flex;gap:6px;flex-wrap:nowrap;">${actions}</div></td>
    </tr>`;
  }).join('');

  el('#jobs-table').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>任务ID</th>
          <th>状态</th>
          <th>案件文件</th>
          <th>创建时间</th>
          <th>认领时间</th>
          <th>进度</th>
          <th>失败原因</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

/* ── 操作 ── */
async function requeueJob(jobId) {
  try {
    const r = await api('POST', `/v1/job/${encodeURIComponent(jobId)}/requeue`);
    if (r.ok) { showToast('任务已重新排队', 'success'); fetchJobs(); }
  } catch (e) { showError('重新排队失败: ' + e.message); }
}

function confirmCancel(jobId) {
  showModal(
    '取消任务',
    `确定取消任务 <code>${jobId.slice(0,16)}...</code>？此操作不可撤销。`,
    async () => {
      try {
        const r = await api('POST', `/v1/job/${encodeURIComponent(jobId)}/cancel`);
        if (r.ok) { showToast('任务已取消', 'info'); fetchJobs(); }
      } catch (e) { showError('取消失败: ' + e.message); }
    },
    '取消任务',
    'warning'
  );
}

function confirmDelete(jobId) {
  showModal(
    '删除任务',
    `确定删除任务 <code>${jobId.slice(0,16)}...</code>？任务将从队列中移除，但输出文件不会删除。此操作不可撤销。`,
    async () => {
      try {
        const r = await api('DELETE', `/v1/job/${encodeURIComponent(jobId)}`);
        if (r.ok) { showToast('任务已删除', 'success'); fetchJobs(); }
      } catch (e) { showError('删除失败: ' + e.message); }
    },
    '删除',
    'danger'
  );
}

function confirmCancelAll() {
  const pending = currentJobs.filter(j => j.status === 'pending');
  if (pending.length === 0) { showToast('没有待处理的任务', 'info'); return; }
  showModal(
    '取消全部待处理',
    `确定取消全部 <strong>${pending.length}</strong> 个待处理任务？此操作不可撤销。`,
    async () => {
      try {
        const r = await api('POST', '/v1/jobs/cancel');
        if (r.ok) { showToast(`已取消 ${r.canceled?.length || 0} 个任务`, 'success'); fetchJobs(); }
      } catch (e) { showError('批量取消失败: ' + e.message); }
    },
    `取消 ${pending.length} 个任务`,
    'warning'
  );
}

/* ── 详情弹窗 ── */
function showJobDetail(job) {
  el('#detail-job-id').textContent = job.id;
  el('#detail-status-badge').innerHTML = statusBadge(job.status);

  const fmt = v => v === null || v === undefined ? '<span class="null">null</span>' : esc(String(v));
  const fmtMono = v => v === null || v === undefined ? '<span class="null">null</span>' : `<span class="mono">${esc(String(v))}</span>`;

  const assetsHtml = job.assets && job.assets.length
    ? job.assets.map(a => {
        const isImage = a.mimeType && a.mimeType.startsWith('image/');
        return `<div class="detail-asset-item">
          <span class="idx">#${a.index}</span>
          <span class="label">${esc(a.label || '')}</span>
          ${isImage
            ? `<img src="${API}/v1/assets/${esc(job.id)}/${a.index}" style="max-width:80px;max-height:60px;border-radius:4px;border:1px solid var(--border);" loading="lazy" />`
            : `<span class="name">${esc(a.name || '')}</span>`
          }
          <span class="mime">${esc(a.mimeType || '')}</span>
        </div>`;
      }).join('')
    : '<div style="color:var(--text-muted)">无资产</div>';

  const progressHtml = job.progress && job.progress.length
    ? job.progress.map(p => `<div class="detail-progress-item">
        <span class="ts">${p.at ? new Date(p.at).toLocaleTimeString() : '—'}</span>
        <div>
          <div class="msg">${esc(p.message || '')}</div>
          ${p.details ? `<div class="details">${esc(JSON.stringify(p.details).slice(0, 200))}</div>` : ''}
        </div>
      </div>`).join('')
    : '<div style="color:var(--text-muted)">无进度记录</div>';

  const mediaAi = job.mediaAi || {};
  const mediaAiRows = Object.entries(mediaAi)
    .filter(([k]) => k !== 'cookie')
    .map(([k, v]) => {
      const isUrl = typeof v === 'string' && v.startsWith('http');
      return `<div class="detail-field">
        <span class="detail-field-label">${esc(k)}</span>
        <span class="detail-field-value">${isUrl
          ? `<span class="media-url" style="color:var(--accent)">${esc(v)}</span><img class="media-img" src="${esc(v)}" style="display:none;max-width:120px;max-height:80px;border-radius:4px;border:1px solid var(--border);margin-top:4px;" loading="lazy" />`
          : typeof v === 'object'
            ? `<pre style="margin:0;font-size:10px;white-space:pre-wrap;color:var(--accent)">${esc(JSON.stringify(v, null, 2))}</pre>`
            : fmt(v)
        }</span>
      </div>`;
    }).join('');

  el('#detail-body').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">任务信息</div>
      <div class="detail-grid">
        <div class="detail-field">
          <span class="detail-field-label">任务ID</span>
          <span class="detail-field-value mono">${fmtMono(job.id)}</span>
        </div>
        <div class="detail-field">
          <span class="detail-field-label">状态</span>
          <span class="detail-field-value">${statusBadge(job.status)}</span>
        </div>
        <div class="detail-field">
          <span class="detail-field-label">创建时间</span>
          <span class="detail-field-value">${fmt(job.createdAt)}</span>
        </div>
        <div class="detail-field">
          <span class="detail-field-label">认领时间</span>
          <span class="detail-field-value">${fmt(job.claimedAt)}</span>
        </div>
        <div class="detail-field">
          <span class="detail-field-label">完成时间</span>
          <span class="detail-field-value">${fmt(job.finishedAt)}</span>
        </div>
        <div class="detail-field">
          <span class="detail-field-label">失败原因</span>
          <span class="detail-field-value">${job.failureReason ? `<span style="color:var(--red)">${esc(job.failureReason)}</span>` : '<span class="null">null</span>'}</span>
        </div>
        <div class="detail-field full">
          <span class="detail-field-label">案件文件</span>
          <span class="detail-field-value mono">${fmtMono(job.caseFile)}</span>
        </div>
        ${job.outputDir ? `<div class="detail-field full">
          <span class="detail-field-label">输出目录</span>
          <span class="detail-field-value mono">${fmtMono(job.outputDir)}</span>
        </div>` : ''}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title" style="display:flex;align-items:center;justify-content:space-between;">
        <span>媒体AI</span>
        <button onclick="
          const sec = this.closest('.detail-section');
          const imgVisible = sec.dataset.img === '1';
          sec.querySelectorAll('.media-img').forEach(el => el.style.display = imgVisible ? 'none' : 'inline');
          sec.querySelectorAll('.media-url').forEach(el => el.style.display = imgVisible ? 'inline' : 'none');
          this.textContent = imgVisible ? '显示图片' : '显示地址';
          sec.dataset.img = imgVisible ? '0' : '1';
        " style="font-size:10px;padding:3px 10px;">显示图片</button>
      </div>
      <div class="detail-grid" id="media-ai-grid">${mediaAiRows || '<div style="color:var(--text-muted)">无媒体AI数据</div>'}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">资产 (${(job.assets || []).length})</div>
      <div class="detail-assets">${assetsHtml}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">进度日志 (${(job.progress || []).length})</div>
      <div class="detail-progress-list">${progressHtml}</div>
    </div>
  `;

  el('#detail-modal').classList.add('active');
}

function closeDetailModal() {
  el('#detail-modal').classList.remove('active');
}

function detailOnClick(jobId) {
  const job = currentJobs.find(j => j.id === jobId);
  if (job) showJobDetail(job);
}

/* ── 筛选按钮 ── */
els('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    els('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable(currentJobs);
  });
});

/* ── 自动刷新 ── */
setInterval(fetchJobs, 5000);

/* ── 初始加载 ── */
fetchJobs();
</script>
</body>
</html>
